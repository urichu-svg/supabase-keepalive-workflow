name: Supabase Keepalive

on:
  schedule:
    # 每 3 天的 UTC 00:00 執行一次（遠在 7 天閒置上限內，留足緩衝）
    - cron: "0 0 */3 * *"
  workflow_dispatch:   # 也可在 Actions 頁面手動觸發測試

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase to keep the project active..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=*&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "HTTP status: $HTTP_CODE"
          # 2xx 都算成功；其餘視為失敗讓 workflow 變紅，方便收到通知
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Keepalive failed!"
            exit 1
          fi
          echo "Keepalive OK."
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_TABLE: ${{ vars.SUPABASE_TABLE || 'keepalive' }}
